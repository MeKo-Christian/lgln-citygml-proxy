replicaCount: 1

image:
  repository: ghcr.io/meko-tech/lgln-citygml-proxy
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

config:
  port: 8080
  cacheDir: /cache

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

# Persist the tile cache across restarts
persistence:
  enabled: false
  storageClass: ""
  size: 10Gi
  accessMode: ReadWriteOnce

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 75
