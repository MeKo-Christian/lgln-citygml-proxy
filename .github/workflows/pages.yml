name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Build WASM
        run: GOOS=js GOARCH=wasm go build -o web/citygml.wasm ./cmd/wasm

      - name: Copy wasm_exec.js
        run: |
          GOROOT=$(go env GOROOT)
          if [ -f "$GOROOT/misc/wasm/wasm_exec.js" ]; then
            cp "$GOROOT/misc/wasm/wasm_exec.js" web/
          elif [ -f "$GOROOT/lib/wasm/wasm_exec.js" ]; then
            cp "$GOROOT/lib/wasm/wasm_exec.js" web/
          fi

      - name: Download Hannover tiles
        run: |
          mkdir -p web/tiles
          BASE="https://lod2.s3.eu-de.cloud-object-storage.appdomain.cloud"
          for tile in "550_5800" "550_5801" "551_5800" "551_5801"; do
            name="LoD2_32_${tile}_1_ni.gml"
            echo "Downloading $name…"
            curl -fsSL "$BASE/$name" -o "web/tiles/$name"
          done

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
